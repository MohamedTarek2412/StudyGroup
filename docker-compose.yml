services:

  # ─── SQL Server Database ───────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: studygroup_db
    environment:
      SA_PASSWORD: StudyGroup@2026
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql
      - ./database/init:/docker-init
    networks:
      - studygroup_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost",
             "-U", "sa",
             "-P", "StudyGroup@2026",
             "-Q", "SELECT 1",
             "-No"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    restart: unless-stopped

  # ─── DB Init  ────────────────
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: studygroup_db_init
    environment:
      DB_PASSWORD: StudyGroup@2026
    volumes:
      - ./database/init:/docker-init
    networks:
      - studygroup_network
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "/opt/mssql-tools18/bin/sqlcmd -S db,1433 -U sa -P \"$DB_PASSWORD\" -i /docker-init/seed-data.sql -No"
    restart: "no"

  # ─── .NET Backend API ──────────────────────────────────────────
  api:
    build:
      context: ./backend/StudyGroup.API
      dockerfile: Dockerfile
    container_name: studygroup_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=StudyGroupDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True"
      JwtOptions__Secret: ${JWT_SECRET}
      JwtOptions__Issuer: ${JWT_ISSUER}
      JwtOptions__Audience: ${JWT_AUDIENCE}
      JwtOptions__ExpiryMinutes: ${JWT_EXPIRY_MINUTES}
      CORS__AllowedOrigins: "http://localhost:3000"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - studygroup_network
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  # ─── React Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/studygroup-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
        REACT_APP_SIGNALR_URL: http://localhost:5000
    container_name: studygroup_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - studygroup_network
    restart: unless-stopped

  # ─── Adminer (Database GUI) ────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: studygroup_adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - studygroup_network
    restart: unless-stopped

# ─── Volumes ────────────────────────────────────────────────────
volumes:
  db_data:       
  uploads_data:  

# ─── Network ────────────────────────────────────────────────────
networks:
  studygroup_network:
    driver: bridge